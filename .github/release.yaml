# Categorizes the auto-generated release notes (used by `gh release create
# --generate-notes` in release.yml) by PR label.

changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
  categories:
    - title: Features
      labels: [enhancement, feature]
    - title: Bug Fixes
      labels: [bug, fix]
    - title: Documentation
      labels: [documentation, docs]
    - title: Other Changes
      labels: ["*"]
