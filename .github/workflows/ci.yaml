name: ci

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uvx ruff check src tests

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: >
          uv run --extra dev pytest
          --cov=invisoutlet --cov-report=xml --cov-report=term-missing
      - uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          # Tokenless upload works for public repos; set CODECOV_TOKEN as a
          # repo secret if the repo is private.
          token: ${{ secrets.CODECOV_TOKEN }}
