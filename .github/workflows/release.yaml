name: release

# Cuts a GitHub release whenever the version in pyproject.toml changes on the
# default branch. The release tag is v<version>; notes are auto-generated from
# the PRs merged since the previous tag.

on:
  push:
    branches: [main, master]
    paths: [pyproject.toml]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so release notes can diff against the last tag
      - name: Read version from pyproject.toml
        id: ver
        run: |
          version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Create release if the tag doesn't exist yet
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: v${{ steps.ver.outputs.version }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; nothing to do."
            exit 0
          fi
          gh release create "$TAG" --target "$GITHUB_SHA" --title "$TAG" --generate-notes
