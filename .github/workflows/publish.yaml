name: publish

# Builds and uploads the package to PyPI when a GitHub release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token. Configure a trusted
# publisher on PyPI for this repo, workflow (publish.yml), and the "pypi"
# environment first: https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
